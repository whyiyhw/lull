# 构建自包含单文件产物并发布到 GitHub Pages。
# 启用步骤（一次性）：
#   1. 建 GitHub 远端并 push（本仓库当前无 remote）。
#   2. 仓库 Settings → Pages → Build and deployment → Source 选「GitHub Actions」。
#   3. push 到 main 即自动构建 dist/ 并上线；产物是 dist/index.html（内联全部 JS/CSS）+ public/ 运行时资源。
# base 已设为 './'（相对路径），项目站点路径 https://<user>.github.io/<repo>/ 下可直接工作。
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
